<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Log In | Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-body">
  <div id="page-loader" class="page-loader">
    <div class="loader-logo-wrap">
      <img inert draggable="false" data-no-visual-search src="images/stacklylogo.webp" alt="Stackly" class="loader-logo-img" loading="eager">
    </div>
    <span class="loader-text">Loading</span>
  </div>

  <main class="split-auth-container">
    <!-- Left Panel -->
    <section class="auth-split-left">
      <div class="logo-text-large">STACKLY</div>
      <div class="welcome-subtitle">Welcome back!</div>
      <h2 class="welcome-message">Access your dashboard and manage your career journey</h2>
      <a href="index.html" class="btn btn-back-home">Back To Home</a>
    </section>

    <!-- Right Panel -->
    <section class="auth-split-right">
      <div class="auth-split-form-wrap">
        <h1>Login to your account</h1>
        <p class="auth-subtitle">
          Don't have an account? 
          <a href="signup.html" id="signup-link-role">Sign Up</a>
        </p>

        <form id="login-form" novalidate>
          <div class="input-group">
            <label for="role-select-dropdown">Login as</label>
            <select id="role-select-dropdown" class="split-select-field">
              <option value="seeker">Job Seeker</option>
              <option value="recruiter">Recruiter</option>
            </select>
          </div>

          <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="input-field" placeholder="Enter Your Email" required autocomplete="email">
            <span class="field-error" id="login-email-error">Please enter a valid email</span>
          </div>

          <div class="input-group">
            <label for="login-password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" class="input-field" placeholder="Enter Password" required minlength="6" autocomplete="current-password">
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                <i class="ph ph-eye"></i>
              </button>
            </div>
            <span class="field-error" id="login-password-error">Password must be at least 6 characters</span>
          </div>
          
          <div class="auth-options-row">
            <label class="custom-checkbox-container">
              <input type="checkbox" id="login-remember" checked>
              <span class="checkbox-checkmark"></span>
              <span class="checkbox-label-text">Remember me</span>
            </label>
            <a href="404.html" class="forgot-password-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-orange-action btn-auth-submit">
            <span class="btn-text">Log In</span>
          </button>
          
          <div class="auth-divider">
            <span>Or create with</span>
          </div>

          <div class="social-login-grid">
            <a href="404.html" class="btn-social">
              <i class="ph ph-facebook-logo" style="color: #1877F2;"></i> Facebook
            </a>
            <a href="404.html" class="btn-social">
              <i class="ph ph-google-logo" style="color: #DB4437;"></i> Google
            </a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
